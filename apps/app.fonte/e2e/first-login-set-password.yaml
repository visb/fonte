appId: org.fonte.app
---
# Primeiro acesso (must_change_password): após definir a senha, o app deve
# logar automaticamente e ir para a home — NÃO voltar para a tela de login.
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Entrar"
    timeout: 30000
- tapOn:
    text: "input-email"
- inputText: "familiar2@fonte.com"
- tapOn:
    text: "input-senha"
- inputText: "temp123"
- tapOn: "Entrar"
- waitForAnimationToEnd

# Tela de definição de senha no primeiro acesso.
- assertVisible: "Trocar senha"
- tapOn:
    text: "input-nova-senha"
- inputText: "novaSenha123"
- tapOn:
    text: "input-confirmar-senha"
- inputText: "novaSenha123"
- tapOn: "Salvar senha"
- waitForAnimationToEnd

# Auto-login: cai na home (Casa Teste), sem reaparecer o login.
- assertVisible: "Casa Teste"
- assertNotVisible: "Entrar"
