appId: org.fonte.ops
---
- runFlow: helpers/login-operator.yaml
- tapOn: "Nova ocorrência"
- assertVisible: "Descreva a ocorrência com detalhes..."
- tapOn: "Descreva a ocorrência com detalhes..."
- inputText: "Ocorrência de teste E2E"
