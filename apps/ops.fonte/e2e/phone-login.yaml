appId: org.fonte.ops
---
# Login por whatsapp — operador (whatsapp seed "11977771000"; o backend
# normaliza dígitos tanto no persist quanto no lookup — story 97).
- launchApp:
    clearState: true
- tapOn:
    text: "input-email"
- inputText: "11977771000"
- tapOn:
    text: "input-senha"
- inputText: "operator123"
- tapOn: "Entrar"
- assertVisible: "Bem-vindo,"
- assertVisible: "Operador Teste"

# WhatsApp correto + senha errada → recusa.
- launchApp:
    clearState: true
- tapOn:
    text: "input-email"
- inputText: "11977771000"
- tapOn:
    text: "input-senha"
- inputText: "senha_errada"
- tapOn: "Entrar"
- assertVisible: "WhatsApp/e-mail ou senha incorretos."
