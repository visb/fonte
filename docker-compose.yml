services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: fonte
      POSTGRES_PASSWORD: fonte
      POSTGRES_DB: fonte_dev
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fonte']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
