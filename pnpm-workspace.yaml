packages:
  - "apps/*"
  - "services/*"
  - "packages/*"
nodeLinker: hoisted
allowBuilds:
  '@nestjs/core': true
  '@sentry/cli': true
  '@sentry/node-cpu-profiler': true
  '@swc/core': true
  bcrypt: true
  esbuild: true
  puppeteer: false
  sharp: true
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@sentry/cli"
  - "@sentry/node-cpu-profiler"
  - bcrypt
  - esbuild
